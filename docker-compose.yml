# ===================================================================
# Docker Compose — Componente A (User Service + PostgreSQL)
# ===================================================================


services:

  # ─────────────── Base de Datos Relacional ───────────────
  postgres_db:
    image: postgres:15-alpine
    container_name: component_a_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-component_a}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - component_a_network
    restart: always

  # ─────────────── API FastAPI (Componente A) ─────────────
  component_a:
    build: .
    container_name: component_a_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sobreescribe DATABASE_URL para apuntar al servicio postgres_db
      # dentro de la red interna de Docker (no localhost)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres_db:5432/${POSTGRES_DB:-component_a}
    depends_on:
      - postgres_db
    networks:
      - component_a_network
    restart: always

# ─────────────── Red Interna (Bridge) ─────────────
networks:
  component_a_network:
    driver: bridge

# ─────────────── Volumen Persistente ─────────────
volumes:
  postgres_data:
